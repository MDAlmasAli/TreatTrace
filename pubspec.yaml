name: treat_trace
description: TreatTrace - Find doctors and book appointments with ease.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Supabase: handles authentication, database, and session management
  supabase_flutter: ^2.5.6

  # Google Fonts: clean, professional medical typography
  google_fonts: ^6.2.1

  # Flutter Animate: smooth page and widget animations
  flutter_animate: ^4.5.0

  # Cupertino Icons: iOS-style icon set
  cupertino_icons: ^1.0.8

  # Persistent key-value storage — theme, locale, keep-me-logged-in
  shared_preferences: ^2.3.2

  # Image picker — avatar photo selection from gallery or camera
  image_picker: ^1.1.2

  # Local notifications — medicine reminder scheduling
  flutter_local_notifications: ^18.0.1

  # Timezone — required for scheduled notifications
  timezone: ^0.9.4

  # PDF generation — prescription PDF export
  pdf: ^3.11.1

  # PDF printing/sharing — share prescription PDF
  printing: ^5.13.2

  # File picker — pick PDFs and other documents for upload
  file_picker: ^8.1.2

  # URL launcher — open documents in browser / external app
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "Logo/treattrace_icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#136AFB"
  adaptive_icon_foreground: "Logo/treattrace_foreground_1024.png"
  web:
    generate: true
    image_path: "Logo/treattrace_icon_1024.png"
    background_color: "#136AFB"
    theme_color: "#136AFB"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - Logo/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans.ttf
          weight: 700
